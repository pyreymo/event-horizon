name: Release

on:
    push:
        tags:
            - "v*"

permissions:
    contents: write

jobs:
    build:
        runs-on: windows-2022

        steps:
            - name: Checkout
              uses: actions/checkout@v5
              with:
                  submodules: recursive
                  fetch-depth: 0

            - name: Install .NET
              uses: actions/setup-dotnet@v5
              with:
                  dotnet-version: 10.0.x

            - name: Download Dalamud
              shell: pwsh
              run: |
                  Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/latest.zip -OutFile latest.zip
                  Expand-Archive -Force latest.zip "$env:AppData\XIVLauncher\addon\Hooks\dev"

            - name: Build
              run: dotnet build .\EventHorizon\EventHorizon.csproj --configuration Release -p:Platform=x64

            - name: Prepare release files
              shell: pwsh
              run: |
                  $zip = Get-ChildItem ".\EventHorizon\bin" -Recurse -Filter "latest.zip" | Select-Object -First 1

                  if (-not $zip) {
                      Write-Host "Could not find latest.zip. Dumping bin tree:"
                      Get-ChildItem ".\EventHorizon\bin" -Recurse | Select-Object FullName
                      exit 1
                  }

                  $packageDir = $zip.Directory.FullName
                  Write-Host "Package directory: $packageDir"

                  Copy-Item $zip.FullName ".\EventHorizon.zip"

                  $manifest = Join-Path $packageDir "EventHorizon.json"
                  if (-not (Test-Path $manifest)) {
                      Write-Host "Could not find EventHorizon.json next to latest.zip. Dumping package dir:"
                      Get-ChildItem $packageDir | Select-Object FullName
                      exit 1
                  }

                  Copy-Item $manifest ".\EventHorizon.generated.json"
                  Copy-Item $manifest "$env:RUNNER_TEMP\EventHorizon.generated.json"

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  files: |
                      EventHorizon.zip
                      EventHorizon.generated.json

            - name: Update repo.json
              shell: pwsh
              run: |
                  git checkout master

                  function Set-JsonProp($obj, $name, $value) {
                      if ($obj.PSObject.Properties[$name]) {
                          $obj.$name = $value
                      } else {
                          $obj | Add-Member -NotePropertyName $name -NotePropertyValue $value
                      }
                  }

                  function Copy-JsonProps($source, $target) {
                      foreach ($prop in $source.PSObject.Properties) {
                          Set-JsonProp $target $prop.Name $prop.Value
                      }
                  }

                  $generated = Get-Content "$env:RUNNER_TEMP\EventHorizon.generated.json" -Raw | ConvertFrom-Json

                  if (Test-Path ".\repo.json") {
                      $repo = @(Get-Content ".\repo.json" -Raw | ConvertFrom-Json)
                      $entry = $repo | Where-Object { $_.InternalName -eq $generated.InternalName } | Select-Object -First 1

                      if (-not $entry) {
                          $entry = [pscustomobject]@{}
                          $repo += $entry
                      }
                  } else {
                      $entry = [pscustomobject]@{}
                      $repo = @($entry)
                  }

                  # Preserve handwritten fields already present in repo.json, then overwrite with generated manifest fields.
                  Copy-JsonProps $generated $entry

                  $releaseBase = "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}"

                  Set-JsonProp $entry "DownloadLinkInstall" "$releaseBase/EventHorizon.zip"
                  Set-JsonProp $entry "DownloadLinkUpdate" "$releaseBase/EventHorizon.zip"
                  Set-JsonProp $entry "LastUpdate" ([DateTimeOffset]::UtcNow.ToUnixTimeSeconds())

                  ConvertTo-Json -InputObject ([object[]]$repo) -Depth 20 | Set-Content ".\repo.json" -Encoding UTF8

            - name: Commit repo.json
              shell: pwsh
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

                  git add repo.json

                  if (git diff --cached --quiet) {
                      Write-Host "repo.json unchanged."
                  } else {
                      git commit -m "Update repo.json for ${{ github.ref_name }}"
                      git push origin master
                  }

